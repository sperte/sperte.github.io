<meta charset="utf-8">
<title>{{ page.title | default: site.title | escape }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ page.description | default: site.description | strip_newlines | strip | escape }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<!-- Same Jekyll build is served at {{ site.pages_mirror_url }}/ (GitHub Pages default). Custom domain: CNAME + repo Settings → Pages. -->
<link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100;200;300;400;900&family=Karla:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}">
{% if jekyll.environment == 'production' and site.google_analytics %}
{% include google-analytics.html %}
{% endif %}
