# Site settings
title: "Sean Sperte"
email: sean@sperte.com
description: >
  Product designer. Leading design at Pinwheel; previously founding designer at Passbook (Remitly), co-founder of Tagboard.
baseurl: ""
# Canonical base for absolute_url, feeds, and <link rel="canonical">. GitHub Pages still serves the same
# build at https://sperte.github.io (user Pages default) when this repo name is sperte.github.io.
url: "https://seansperte.com"
pages_mirror_url: "https://sperte.github.io"
repository: sperte/sperte.github.io
lang: en
twitter_username: sperte
github_username: sperte
google_analytics: UA-46810847-1

# Build settings
permalink: /entry/:title
paginate: 10
paginate_path: "/:num"
markdown: kramdown

defaults:
  -
    scope:
      path: ""
    values:
      layout: default
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: post

